<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="J&G Design Group: kitchen, bathroom and laundry renovations across Melbourne with over 20 years of experience. FREE consultation, site visit and detailed quote. Call 0417 577 553." />
    <meta name="theme-color" content="#2d4a26" />
    <meta property="og:locale" content="en_AU" />
    <title>J&G Design Group | Kitchen, Bathroom & Laundry Renovations Melbourne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HomeAndConstructionBusiness",
      "name": "J&G Design Group",
      "description": "Kitchen, bathroom and laundry renovation specialists with over 20 years of experience, servicing Melbourne. FREE consultation, site visit and detailed quote.",
      "telephone": "+61417577553",
      "email": "contact@jandgdesigns.com.au",
      "url": "https://www.jandgdesigns.com.au",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Unit 6/30 Heaths Ct",
        "addressLocality": "Mill Park",
        "addressRegion": "VIC",
        "postalCode": "3082",
        "addressCountry": "AU"
      },
      "areaServed": { "@type": "City", "name": "Melbourne" },
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "08:00",
        "closes": "16:00"
      }],
      "priceRange": "$$"
    }
    </script>
  </head>
  <body>
    <!-- Hidden form so Netlify detects and captures submissions from the React form -->
    <form name="consultation" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="checkbox" name="rooms" value="Kitchen" />
      <input type="checkbox" name="rooms" value="Bathroom" />
      <input type="checkbox" name="rooms" value="Laundry" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
